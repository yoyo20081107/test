<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyber Vocab 系統</title>
  
  <!-- 載入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 載入 React 與 ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- 載入 Babel 編譯器 (讓瀏覽器能直接看懂 React JSX 語法) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- 載入 Lucide Icons 圖示庫 -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    /* 浮現動畫 */
    @keyframes fade-in-up {
      0% { opacity: 0; transform: translateY(5px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up {
      animation: fade-in-up 0.2s linear forwards;
    }

    /* 駭客風捲軸 */
    .custom-scrollbar::-webkit-scrollbar {
      width: 8px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: #000;
      border-left: 1px solid rgba(34, 197, 94, 0.2);
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(34, 197, 94, 0.5);
      border-radius: 0;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: rgba(34, 197, 94, 0.8);
    }
    
    /* 隱藏主頁面的全域捲軸 */
    ::-webkit-scrollbar {
      width: 0px;
      background: transparent;
    }

    /* CRT 橫向掃描線特效 */
    .scanlines::before {
      content: " ";
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      z-index: 50;
      background-size: 100% 4px, 3px 100%;
      pointer-events: none;
    }

    body {
      -webkit-tap-highlight-color: transparent;
      background-color: #000;
      margin: 0;
      overflow-x: hidden;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // --- 圖示系統整合 ---
    // 在獨立網頁中將 Lucide 圖示封裝為 React 元件
    const Icon = ({ name, size = 24, className = '', strokeWidth = 2, ...rest }) => {
      const ref = useRef();
      useEffect(() => {
        if (ref.current) {
          ref.current.innerHTML = `<i data-lucide="${name}"></i>`;
          lucide.createIcons({
            root: ref.current,
            attrs: { width: size, height: size, 'stroke-width': strokeWidth, ...rest }
          });
        }
      }, [name, size, strokeWidth, rest]);
      return <span ref={ref} className={`inline-flex items-center justify-center ${className}`}></span>;
    };

    const Terminal = (p) => <Icon name="terminal" {...p} />;
    const Database = (p) => <Icon name="database" {...p} />;
    const Cpu = (p) => <Icon name="cpu" {...p} />;
    const Code = (p) => <Icon name="code" {...p} />;
    const Unlock = (p) => <Icon name="unlock" {...p} />;
    const Lock = (p) => <Icon name="lock" {...p} />;
    const CheckSquare = (p) => <Icon name="check-square" {...p} />;
    const XSquare = (p) => <Icon name="x-square" {...p} />;
    const ChevronsRight = (p) => <Icon name="chevrons-right" {...p} />;
    const ChevronsLeft = (p) => <Icon name="chevrons-left" {...p} />;
    const RotateCcw = (p) => <Icon name="rotate-ccw" {...p} />;
    const Home = (p) => <Icon name="home" {...p} />;
    const Volume2 = (p) => <Icon name="volume-2" {...p} />;
    const Trophy = (p) => <Icon name="trophy" {...p} />;

    // --- 單字庫與工具函數 ---
    const WORD_LIST = [
      { en: "accuracy", zh: "準確性", prefix: "-", suffix: "-cy (名詞字尾: 狀態)", forms: ["accurate (adj. 準確的)", "accurately (adv. 準確地)"], example: "To ensure the success of the scientific experiment, researchers had to maintain absolute _____ in their data collection.", translation: "為了確保科學實驗的成功，研究人員在收集數據時必須保持絕對的準確性。" },
      { en: "admit", zh: "承認", prefix: "ad- (朝向)", suffix: "-", forms: ["admission (n. 承認/准許)"], example: "Facing the overwhelming evidence presented by the prosecutor, the suspect had no choice but to _____ his involvement in the fraud.", translation: "面對檢察官提出的壓倒性證據，嫌犯別無選擇，只能承認參與了這起詐欺案。" },
      { en: "agent", zh: "代理人", prefix: "ag- (做/行動)", suffix: "-ent (名詞字尾: 人/物)", forms: ["agency (n. 代理機構)"], example: "The famous actor hired a professional _____ to negotiate his contract and handle public relations on his behalf.", translation: "這位著名演員聘請了一位專業代理人來替他談判合約並處理公共關係。" },
      { en: "ambulance", zh: "救護車", prefix: "ambul- (行走)", suffix: "-ance (名詞字尾: 狀態)", forms: [], example: "As soon as the severe car accident occurred on the highway, a bystander immediately called for an _____ to rescue the injured.", translation: "高速公路上發生嚴重車禍後，一名旁觀者立刻呼叫救護車來拯救傷患。" },
      { en: "arrest", zh: "逮捕", prefix: "ar- (朝向/強調)", suffix: "-", forms: [], example: "After months of intensive investigation, the local police finally managed to _____ the notorious criminal hiding in the warehouse.", translation: "經過數月的密集調查，當地警方終於逮捕了躲藏在倉庫裡的惡名昭彰的罪犯。" },
      { en: "bravery", zh: "勇氣", prefix: "-", suffix: "-ery (名詞字尾: 狀態/性質)", forms: ["brave (adj. 勇敢的)"], example: "The soldier received a prestigious medal of honor as a recognition of his extraordinary _____ during the fierce battle.", translation: "這名士兵獲得了一枚極具聲望的榮譽勳章，以表彰他在激烈戰鬥中展現的非凡勇氣。" },
      { en: "burst", zh: "爆發", prefix: "-", suffix: "-", forms: [], example: "Due to the sudden increase in water pressure caused by the heavy storm, the old underground pipes suddenly _____.", translation: "由於暴風雨導致水壓驟增，老舊的地下水管突然爆發破裂。" },
      { en: "classic", zh: "經典的", prefix: "-", suffix: "-ic (形容詞字尾: ...的)", forms: ["classical (adj. 古典的)", "class (n. 階級/班級)"], example: "The professor recommended several _____ novels from the 19th century that every literature major is required to read and analyze.", translation: "教授推薦了幾部十九世紀的經典小說，這是每個文學系學生都必須閱讀和分析的。" },
      { en: "code", zh: "程式碼", prefix: "-", suffix: "-", forms: ["decode (v. 解碼)"], example: "In order to protect user privacy, software engineers developed a complex encryption _____ that is nearly impossible for hackers to break.", translation: "為了保護用戶隱私，軟體工程師開發了一種駭客幾乎無法破解的複雜加密程式碼。" },
      { en: "colleague", zh: "同事", prefix: "col- (共同/一起)", suffix: "-", forms: [], example: "After the stressful presentation, I invited my supportive _____ to a nearby café to celebrate the successful conclusion of our joint project.", translation: "在壓力極大的簡報結束後，我邀請了一直支持我的同事去附近的咖啡館，慶祝我們聯合專案的圓滿成功。" },
      { en: "commute", zh: "通勤", prefix: "com- (共同/一起)", suffix: "-", forms: ["commuter (n. 通勤者)"], example: "Because she lives in the distant suburbs, her daily _____ to the city center takes more than two hours by train and bus.", translation: "因為住在偏遠的郊區，她每天搭火車和公車到市中心上班的通勤時間需要超過兩個小時。" },
      { en: "compassionate", zh: "富有同情心的", prefix: "com- (共同)", suffix: "-ate (形容詞字尾: 具有...的)", forms: ["compassion (n. 同情)"], example: "Working in the palliative care unit requires nurses to be highly _____ and patient when dealing with individuals facing terminal illnesses.", translation: "在安寧病房工作需要護理人員在面對末期疾病患者時，具備高度的同情心與耐心。" },
      { en: "convince", zh: "說服", prefix: "con- (完全/強調)", suffix: "-", forms: ["convincing (adj. 令人信服的)"], example: "Despite his initial reluctance, the persuasive speaker eventually managed to _____ the audience to support the environmental initiative.", translation: "儘管最初有些不情願，這位具有說服力的講者最終還是成功說服觀眾支持這項環境倡議。" },
      { en: "courageous", zh: "勇敢的", prefix: "-", suffix: "-ous (形容詞字尾: 充滿...的)", forms: ["courage (n. 勇氣)"], example: "It was incredibly _____ of the young activist to stand up against the oppressive regime and fight for fundamental human rights.", translation: "這位年輕社運人士起身反抗壓迫政權並為基本人權奮鬥，是極度勇敢的表現。" },
      { en: "document", zh: "文件", prefix: "-", suffix: "-ment (名詞字尾: 結果/事物)", forms: ["documentary (n. 紀錄片)"], example: "Before you can officially rent the apartment, you are required to carefully read and sign this legal _____ provided by the landlord.", translation: "在正式租下這間公寓之前，你必須仔細閱讀並簽署房東提供的這份法律文件。" },
      { en: "efficiency", zh: "效率", prefix: "ef- (向外/強調)", suffix: "-ency (名詞字尾: 狀態)", forms: ["efficient (adj. 有效率的)"], example: "By implementing the new management software, the company significantly increased its operational _____ and reduced unnecessary administrative costs.", translation: "透過導入新的管理軟體，公司顯著提升了營運效率並減少了不必要的行政成本。" },
      { en: "enterprise", zh: "企業", prefix: "enter- (在...之間)", suffix: "-", forms: ["entrepreneur (n. 企業家)"], example: "Transforming a small local startup into a multinational _____ requires visionary leadership, massive investments, and strategic planning.", translation: "將一家本土小型新創公司轉變為跨國企業，需要有遠見的領導力、大量投資和策略規劃。" },
      { en: "excellence", zh: "卓越", prefix: "ex- (向外/超出)", suffix: "-ence (名詞字尾: 狀態)", forms: ["excellent (adj. 優秀的)"], example: "The university awards scholarships annually to students who demonstrate continuous academic _____ and outstanding extracurricular achievements.", translation: "這所大學每年會頒發獎學金給展現出持續學術卓越和傑出課外表現的學生。" },
      { en: "execution", zh: "執行", prefix: "ex- (向外)", suffix: "-ion (名詞字尾: 動作/狀態)", forms: ["execute (v. 執行)", "executive (n. 高階主管)"], example: "While the marketing strategy was brilliant on paper, the actual _____ of the campaign failed miserably due to a lack of coordination.", translation: "雖然行銷策略在紙面上非常出色，但由於缺乏協調，活動的實際執行卻一敗塗地。" },
      { en: "fake", zh: "虛假的", prefix: "-", suffix: "-", forms: [], example: "The antique dealer was arrested for knowingly selling a _____ painting to a wealthy collector for millions of dollars.", translation: "這名古董商因故意將一幅虛假的畫作以數百萬美元賣給富有的收藏家而遭到逮捕。" },
      { en: "flawless", zh: "完美無瑕的", prefix: "-", suffix: "-less (形容詞字尾: 沒有...的)", forms: ["flaw (n. 瑕疵)"], example: "The diamond she wore at the ceremony was absolutely _____, reflecting light beautifully without a single visible imperfection.", translation: "她在典禮上佩戴的鑽石絕對是完美無瑕的，美麗地反射著光線，看不到任何一點瑕疵。" },
      { en: "handle", zh: "處理", prefix: "-", suffix: "-le (反覆動作)", forms: [], example: "As a customer service manager, she has to frequently _____ complaints from dissatisfied clients with diplomacy and patience.", translation: "身為客戶服務經理，她必須經常以圓滑和耐心來處理不滿客戶的投訴。" },
      { en: "isolated", zh: "孤立的", prefix: "-", suffix: "-ed (形容詞字尾: 感到...的/被...的)", forms: ["isolate (v. 孤立)", "isolation (n. 孤立)"], example: "After the devastating avalanche destroyed the only access road, the remote mountain village remained completely _____ from the outside world.", translation: "毀滅性的雪崩摧毀了唯一的聯外道路後，這座偏遠的山村與外界完全孤立了。" },
      { en: "load", zh: "負載", prefix: "-", suffix: "-", forms: ["unload (v. 卸載)", "download (v. 下載)"], example: "The structural engineer warned that the bridge might collapse if the _____ of the heavy cargo trucks exceeds its maximum capacity.", translation: "結構工程師警告說，如果重型貨車的負載超過其最大容量，橋樑可能會坍塌。" },
      { en: "massive", zh: "大量的", prefix: "-", suffix: "-ive (形容詞字尾: 具有...性質的)", forms: ["mass (n. 質量/大量)"], example: "The archaeologists discovered a _____ stone monument hidden deep within the jungle, indicating the existence of a lost civilization.", translation: "考古學家在叢林深處發現了一座大量的（巨大的）石碑，顯示著一個失落文明的存在。" },
      { en: "merely", zh: "僅僅", prefix: "-", suffix: "-ly (副詞字尾: ...地)", forms: ["mere (adj. 僅僅的)"], example: "The politician argued that his controversial statement was _____ a joke, but the furious public completely rejected his inadequate explanation.", translation: "這位政客辯稱他備受爭議的言論僅僅是個玩笑，但憤怒的民眾完全拒絕了他那不充分的解釋。" },
      { en: "network", zh: "網路", prefix: "net- (網)", suffix: "-work (工作/系統)", forms: [], example: "The telecommunications company is investing heavily to build a comprehensive 5G _____ that will cover both urban and remote rural areas.", translation: "這家電信公司正投入巨資建設一個將涵蓋城市與偏遠鄉村地區的綜合 5G 網路。" },
      { en: "obtain", zh: "獲得", prefix: "ob- (朝向/對抗)", suffix: "-", forms: ["obtainable (adj. 可獲得的)"], example: "To travel to that specific country, citizens are legally required to _____ a valid visa from the embassy well in advance.", translation: "為了前往那個特定國家，公民在法律上被要求必須提前向大使館獲得有效簽證。" },
      { en: "particular", zh: "特定的", prefix: "-", suffix: "-ar (形容詞字尾: 關於...的)", forms: ["particularly (adv. 特別地)"], example: "When writing a formal academic essay, you must pay _____ attention to your grammar, advanced vocabulary, and citation format.", translation: "在撰寫正式的學術論文時，你必須對文法、進階字彙和引用格式給予特定的關注。" },
      { en: "rate", zh: "速率", prefix: "-", suffix: "-", forms: ["rating (n. 評等)"], example: "Due to the rapid economic expansion, the inflation _____ has skyrocketed to its highest level in the past two decades.", translation: "由於經濟快速擴張，通貨膨脹速率（率）已飆升至過去二十年來的最高水準。" },
      { en: "recruit", zh: "招募", prefix: "re- (再/重新)", suffix: "-", forms: ["recruitment (n. 招募)"], example: "In order to expand its global market share, the tech giant aims to _____ hundreds of talented software engineers from top universities.", translation: "為了擴大其全球市佔率，這家科技巨頭目標是從頂尖大學招募數百名才華洋溢的軟體工程師。" },
      { en: "retrace", zh: "追溯", prefix: "re- (向後/再)", suffix: "-", forms: ["trace (v./n. 追蹤/痕跡)"], example: "The lost hikers had to carefully _____ their path through the dense forest before it got dark and freezing cold.", translation: "迷路的登山客必須在天黑且變得酷寒之前，小心翼翼地追溯他們穿過茂密森林的路徑。" },
      { en: "roughly", zh: "大致地", prefix: "-", suffix: "-ly (副詞字尾: ...地)", forms: ["rough (adj. 粗糙的/大概的)"], example: "The ambitious construction project is estimated to take _____ three years to complete, depending heavily on the unpredictable weather conditions.", translation: "這項雄心勃勃的建築工程估計大致地需要三年才能完成，很大程度上取決於不可預測的天氣狀況。" },
      { en: "sack", zh: "解僱", prefix: "-", suffix: "-", forms: [], example: "After discovering the severe accounting fraud, the board of directors immediately decided to _____ the chief financial officer.", translation: "在發現嚴重的會計舞弊後，董事會立刻決定解僱財務長。" },
      { en: "scheme", zh: "計劃", prefix: "-", suffix: "-", forms: [], example: "The fraudsters devised a highly elaborate _____ to trick elderly citizens into transferring their life savings into fake bank accounts.", translation: "詐騙集團策劃了一個極度精密的計劃，誘騙老年公民將他們畢生積蓄轉入假銀行帳戶。" },
      { en: "seal", zh: "密封", prefix: "-", suffix: "-", forms: [], example: "To ensure the leftover food remains fresh and prevents bacteria growth, you should completely _____ the plastic container before putting it in the refrigerator.", translation: "為了確保剩菜保持新鮮並防止細菌生長，你應該在將塑膠容器放入冰箱前將其完全密封。" },
      { en: "seize", zh: "抓住", prefix: "-", suffix: "-", forms: ["seizure (n. 沒收/發作)"], example: "Recognizing the rare opportunity, the aspiring entrepreneur moved quickly to _____ control of the newly emerging market before competitors arrived.", translation: "意識到這個罕見的機會，這位有抱負的企業家迅速採取行動，在競爭對手到來之前抓住對新興市場的控制權。" },
      { en: "selfless", zh: "無私的", prefix: "-", suffix: "-less (形容詞字尾: 沒有...的)", forms: ["self (n. 自我)", "selfish (adj. 自私的)"], example: "The community center honored the volunteer for her _____ dedication to helping underprivileged children with their education over the past decade.", translation: "社區中心表揚了這位志工，感謝她在過去十年間無私地致力於幫助弱勢兒童的教育。" },
      { en: "sigh", zh: "嘆息", prefix: "-", suffix: "-", forms: [], example: "Exhausted from the grueling marathon, the runner sat on the grass and let out a heavy _____ of both fatigue and accomplishment.", translation: "這名跑者因艱苦的馬拉松而筋疲力盡，他坐在草地上，發出一聲夾雜著疲憊與成就感的沉重嘆息。" },
      { en: "smuggle", zh: "走私", prefix: "-", suffix: "-le (反覆動作)", forms: ["smuggler (n. 走私者)"], example: "The organized crime syndicate used sophisticated methods to illegally _____ endangered animal parts across international borders.", translation: "有組織的犯罪集團使用複雜的方法，非法將瀕危動物部位走私跨越國際邊界。" },
      { en: "sneak", zh: "偷偷摸摸", prefix: "-", suffix: "-", forms: ["sneaky (adj. 鬼鬼祟祟的)"], example: "The curious journalist attempted to _____ into the restricted military facility to uncover the government's classified secrets.", translation: "好奇的記者試圖偷偷摸摸地溜進軍事管制區，以揭露政府的機密。" },
      { en: "sort", zh: "分類", prefix: "-", suffix: "-", forms: [], example: "The environmental organization launched a campaign urging residents to properly _____ their household waste into recyclable and non-recyclable categories.", translation: "環保組織發起了一項活動，敦促居民正確地將家庭垃圾分類為可回收和不可回收類別。" },
      { en: "starvation", zh: "飢餓", prefix: "-", suffix: "-ation (名詞字尾: 動作/狀態)", forms: ["starve (v. 挨餓)"], example: "The severe drought caused massive crop failures across the region, putting millions of vulnerable residents at imminent risk of _____.", translation: "嚴重的乾旱導致該地區農作物大量歉收，使數百萬脆弱的居民面臨迫在眉睫的飢餓風險。" },
      { en: "suburb", zh: "郊區", prefix: "sub- (在...之下)", suffix: "-", forms: ["suburban (adj. 郊區的)"], example: "Seeking a more peaceful lifestyle away from the chaotic city center, the young family purchased a spacious house in a leafy _____.", translation: "為了尋求遠離喧囂市中心的寧靜生活，這對年輕夫婦在一個綠樹成蔭的郊區買了一棟寬敞的房子。" },
      { en: "suitcase", zh: "行李箱", prefix: "suit- (套裝)", suffix: "-case (箱子)", forms: [], example: "The anxious traveler hastily stuffed all her essential belongings and travel documents into a sturdy _____ before rushing to the airport.", translation: "焦急的旅客在趕往機場前，匆忙將所有必需品和旅行文件塞進一個堅固的行李箱中。" },
      { en: "swiftly", zh: "迅速地", prefix: "-", suffix: "-ly (副詞字尾: ...地)", forms: ["swift (adj. 迅速的)"], example: "The government responded _____ to the natural disaster by deploying emergency rescue teams and distributing essential medical supplies.", translation: "政府對自然災害做出了迅速地回應，派遣緊急救援隊並分發了基本的醫療物資。" },
      { en: "tactic", zh: "策略", prefix: "-", suffix: "-ic (名詞/形容詞: 相關的)", forms: ["tactical (adj. 戰術的)"], example: "The opposing team employed an aggressive defensive _____ that completely disrupted our offense and led to our inevitable defeat.", translation: "敵隊採用了具侵略性的防守策略，徹底打亂了我們的進攻，並導致我們不可避免的失敗。" },
      { en: "transaction", zh: "交易", prefix: "trans- (跨越/改變)", suffix: "-ion (名詞字尾: 動作)", forms: ["transact (v. 交易)"], example: "With the rise of digital currency, verifying the security and anonymity of every online financial _____ has become incredibly important.", translation: "隨著數位貨幣的崛起，驗證每筆線上金融交易的安全性和匿名性變得極其重要。" }
    ];

    const shuffleArray = (array) => {
      const newArray = [...array];
      for (let i = newArray.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
      }
      return newArray;
    };

    const generateSimpleHint = (word) => {
      if (!word || word.length < 2) return word;
      const start = word.charAt(0);
      const end = word.charAt(word.length - 1);
      const middleLength = word.length - 2;
      const middle = Array(middleLength).fill('_').join('');
      return `${start}${middle}${end}`;
    };

    // --- 背景動畫系統 ---
    const BackgroundLogs = () => {
      const [logs, setLogs] = useState([]);

      useEffect(() => {
        const staticLogs = [
          "INITIALIZING SYSTEM KERNEL...",
          "MOUNTING ENCRYPTED VOLUMES... [OK]",
          "STARTING DAEMON: SECURE_SOCKET_LAYER",
          "BYPASSING FIREWALL PROXY 192.168.0.1...",
          "WARNING: UNAUTHORIZED PING DETECTED",
          "EXECUTING BRUTE-FORCE ALGORITHM",
          "DECRYPTING VOCAB_ROOT [IN PROGRESS]",
          "MEMORY ALLOCATION: 1048576 BYTES",
          "CHECKING SYSTEM INTEGRITY...",
          "ESTABLISHING SECURE CONNECTION",
          "DOWNLOADING PAYLOAD: DATA.BIN",
          "CPU TEMP NOMINAL. FAN SPEED: 4500RPM",
        ];

        const generateHex = () => Array.from({length: 4}, () => Math.floor(Math.random()*16).toString(16).toUpperCase()).join('');

        const interval = setInterval(() => {
          setLogs(prev => {
            const newLogs = [...prev];
            if (newLogs.length > 40) newLogs.shift();
            const randomType = Math.random();
            let newLogStr = "";
            if (randomType > 0.6) {
              newLogStr = `[${new Date().toISOString().split('T')[1].slice(0,11)}] ${staticLogs[Math.floor(Math.random() * staticLogs.length)]}`;
            } else {
              newLogStr = `0x${generateHex()}${generateHex()} READ: 0x${generateHex()} 0x${generateHex()} 0x${generateHex()}`;
            }
            newLogs.push(newLogStr);
            return newLogs;
          });
        }, 150);

        return () => clearInterval(interval);
      }, []);

      return (
        <div className="fixed inset-0 z-0 pointer-events-none opacity-[0.15] overflow-hidden p-4 font-mono text-[11px] text-green-500 flex flex-col justify-end leading-tight select-none">
          {logs.map((log, i) => (
            <div key={i} className="whitespace-nowrap truncate">{log}</div>
          ))}
        </div>
      );
    };

    const MatrixRain = () => {
      const canvasRef = useRef(null);

      useEffect(() => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        const setCanvasSize = () => {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        };
        setCanvasSize();
        window.addEventListener('resize', setCanvasSize);

        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789$+-*/=%""\'#&_(),.;:?!\\|{}<>[]^~'.split('');
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const drops = [];
        for (let x = 0; x < columns; x++) {
          drops[x] = Math.random() * -100;
        }

        const draw = () => {
          ctx.fillStyle = 'rgba(0, 0, 0, 0.08)';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.fillStyle = '#0F0';
          ctx.font = fontSize + 'px monospace';
          for (let i = 0; i < drops.length; i++) {
            const text = chars[Math.floor(Math.random() * chars.length)];
            ctx.fillText(text, i * fontSize, drops[i] * fontSize);
            if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
              drops[i] = 0;
            }
            drops[i]++;
          }
        };

        const interval = setInterval(draw, 40);
        return () => {
          clearInterval(interval);
          window.removeEventListener('resize', setCanvasSize);
        };
      }, []);

      return <canvas ref={canvasRef} className="fixed inset-0 z-0 opacity-20 pointer-events-none" />;
    };

    // --- 主程式 ---
    function App() {
      const [view, setView] = useState('home'); 
      const [words, setWords] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [isFlipped, setIsFlipped] = useState(false);
      const [quizQuestions, setQuizQuestions] = useState([]);
      const [selectedOption, setSelectedOption] = useState(null);
      const [score, setScore] = useState(0);
      const [isAnswered, setIsAnswered] = useState(false);
      const [quizMode, setQuizMode] = useState('quiz'); 
      const [userInput, setUserInput] = useState('');
      const [isInputCorrect, setIsInputCorrect] = useState(null);

      const startFlashcards = () => {
        setWords(shuffleArray(WORD_LIST));
        setCurrentIndex(0);
        setIsFlipped(false);
        setView('flashcard');
      };

      const startQuiz = () => {
        const selectedWords = shuffleArray(WORD_LIST).slice(0, 10);
        const questions = selectedWords.map(word => {
          const wrongOptions = WORD_LIST
            .filter(w => w.en !== word.en)
            .sort(() => 0.5 - Math.random())
            .slice(0, 3);
          return {
            question: word.en,
            answer: word.zh,
            options: shuffleArray([...wrongOptions, word]).map(o => o.zh),
            example: word.example,
            translation: word.translation
          };
        });
        setQuizQuestions(questions);
        setCurrentIndex(0);
        setScore(0);
        setSelectedOption(null);
        setIsAnswered(false);
        setQuizMode('quiz');
        setView('quiz');
      };

      const startFillBlank = () => {
        const selectedWords = shuffleArray(WORD_LIST).slice(0, 10);
        const questions = selectedWords.map(word => ({
          question: word.en,
          answer: word.zh,
          example: word.example,
          translation: word.translation,
          hint: generateSimpleHint(word.en)
        }));
        setQuizQuestions(questions);
        setCurrentIndex(0);
        setScore(0);
        setUserInput('');
        setIsAnswered(false);
        setIsInputCorrect(null);
        setQuizMode('fillBlank');
        setView('fillBlank');
      };

      const speakWord = (text, e) => {
        if (e) e.stopPropagation();
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel();
          const utterance = new SpeechSynthesisUtterance(text);
          utterance.lang = 'en-US';
          window.speechSynthesis.speak(utterance);
        }
      };

      const nextCard = () => {
        if (currentIndex < words.length - 1) {
          setIsFlipped(false);
          setCurrentIndex(prev => prev + 1);
        } else {
          setView('home');
        }
      };

      const prevCard = () => {
        if (currentIndex > 0) {
          setIsFlipped(false);
          setCurrentIndex(prev => prev - 1);
        }
      };

      const handleOptionSelect = (option) => {
        if (isAnswered) return;
        setSelectedOption(option);
        setIsAnswered(true);
        if (option === quizQuestions[currentIndex].answer) {
          setScore(prev => prev + 1);
        }
      };

      const handleFillBlankSubmit = () => {
        if (isAnswered || !userInput.trim()) return;
        const currentQ = quizQuestions[currentIndex];
        const isCorrect = userInput.trim().toLowerCase() === currentQ.question.toLowerCase();
        setIsInputCorrect(isCorrect);
        setIsAnswered(true);
        if (isCorrect) {
          setScore(prev => prev + 1);
        }
      };

      const nextQuestion = () => {
        if (currentIndex < quizQuestions.length - 1) {
          setCurrentIndex(prev => prev + 1);
          setSelectedOption(null);
          setUserInput('');
          setIsAnswered(false);
          setIsInputCorrect(null);
        } else {
          setView('result');
        }
      };

      // 渲染首頁 (駭客風格)
      const renderHome = () => (
        <div className="flex flex-col items-center justify-center min-h-[100dvh] px-6 relative z-10 font-mono">
          <div className="text-center mb-12 w-full max-w-sm">

              <div className="flex items-center gap-4">
                <Database size={20} className="group-hover:text-black" />
                <div className="text-left">
                  <div className="leading-tight font-bold tracking-widest">[ DECRYPT_DATA ]</div>
                  <div className="text-[10px] opacity-70 mt-1 uppercase">Flashcards Module</div>
                </div>
              </div>
              <ChevronsRight size={20} className="opacity-50 group-hover:opacity-100 group-hover:translate-x-1 transition-transform" />
            </button>
            
            <button onClick={startQuiz} className="group w-full bg-black border border-green-500/50 text-green-500 p-4 shadow-[0_0_10px_rgba(34,197,94,0.1)] hover:bg-green-500 hover:text-black transition-all flex items-center justify-between active:scale-[0.98]">

                  <div className="leading-tight font-bold tracking-widest">[ OVERRIDE_INPUT ]</div>
                  <div className="text-[10px] opacity-70 mt-1 uppercase">Manual Syntax Entry</div>
                </div>
              </div>
              <ChevronsRight size={20} className="opacity-50 group-hover:opacity-100 group-hover:translate-x-1 transition-transform" />
            </button>
          </div>
          
          <div className="mt-12 text-center text-[10px] font-mono text-green-500/50 tracking-widest uppercase flex flex-col items-center gap-1">
            <span>STATUS: ONLINE</span>
            <span>RECORDS_LOADED: {WORD_LIST.length}</span>
          </div>
        </div>
      );

      // 渲染單字卡 (駭客風格)
      const renderFlashcard = () => {
        const currentWord = words[currentIndex];
        if (!currentWord) return null;

        return (
          <div className="flex flex-col min-h-[100dvh] pt-6 pb-8 px-5 max-w-md mx-auto relative z-10 font-mono">

              <button onClick={() => setView('home')} className="p-2 border border-green-500/30 text-green-500 hover:bg-green-500 hover:text-black transition-colors flex items-center gap-2 text-xs">
                <Home size={14} /> ABORT
              </button>
              <div className="text-xs text-green-500">
                SEQ: {String(currentIndex + 1).padStart(2, '0')}/{String(words.length).padStart(2, '0')}

            <div className="flex-1 flex flex-col justify-center min-h-[440px]">

                <div className="absolute top-0 left-0 w-full bg-green-500/20 border-b border-green-500/50 px-3 py-1 flex justify-between items-center text-[10px]">
                  <span>root@vocab:~# ./decrypt.sh</span>
                  <span className="animate-pulse w-2 h-3 bg-green-500 inline-block"></span>
                </div>

                <div className="flex-1 flex flex-col items-center justify-center text-center w-full mt-6">
                  {!isFlipped ? (
                    <div className="flex flex-col items-center justify-center h-full w-full">
                      <div className="text-green-500/50 text-[10px] tracking-widest uppercase mb-4">[ ENCRYPTED_TARGET ]</div>
                      <h2 className="text-3xl sm:text-4xl font-bold text-green-500 mb-8 break-words tracking-widest drop-shadow-[0_0_5px_rgba(34,197,94,0.8)]">
                        {currentWord.en}
                      </h2>
                      <button onClick={(e) => speakWord(currentWord.en, e)} className="border border-green-500 text-green-500 p-3 hover:bg-green-500 hover:text-black transition-colors flex items-center gap-2 text-xs tracking-widest">
                        <Volume2 size={16} /> PLAY_AUDIO

                        {currentWord.forms && currentWord.forms.length > 0 && (

                            <div className="opacity-50 text-[10px] mb-1">[ MORPHOLOGY_LOG ]</div>
                            <div className="pl-3 border-l border-green-500/30 text-green-400 space-y-1">
                              {currentWord.forms.map((form, idx) => (
                                <div key={idx} className="flex flex-col">
                                  <span className="before:content-['>_'] before:mr-2 before:opacity-50">{form}</span>

                            </div>
                          </div>

                      </div>
                    </div>
                  )}
                </div>
              </div>
            </div>

            <div className="flex justify-between items-center mt-6 gap-3 shrink-0">
              <button onClick={prevCard} disabled={currentIndex === 0} className="p-3 bg-black border border-green-500/50 text-green-500 disabled:opacity-30 disabled:border-green-500/20 flex-1 flex justify-center active:scale-95 transition-all hover:bg-green-500 hover:text-black">
                <ChevronsLeft size={24} />
              </button>
              <button onClick={nextCard} className="p-3 bg-black border border-green-500 text-green-500 flex-1 flex justify-center active:scale-95 transition-all hover:bg-green-500 hover:text-black shadow-[0_0_10px_rgba(34,197,94,0.2)]">
                <ChevronsRight size={24} />
              </button>
            </div>
          </div>
        );
      };

      // 渲染選擇題測驗 (駭客風格)
      const renderQuiz = () => {
        const currentQ = quizQuestions[currentIndex];
        if (!currentQ) return null;

        return (
          <div className="flex flex-col min-h-[100dvh] pt-6 pb-8 px-5 max-w-md mx-auto relative z-10 font-mono">
            <div className="flex items-center justify-between mb-4 shrink-0">
              <button onClick={() => setView('home')} className="text-red-500 border border-red-500/30 hover:bg-red-500 hover:text-black p-1 px-3 text-xs flex items-center gap-1 transition-colors">
                EXIT_SYS
              </button>
              <div className="text-green-500 text-xs">
                BLOCK: {currentIndex + 1}/{quizQuestions.length}
              </div>
            </div>

            <div className="bg-black border border-green-500/50 p-6 mb-6 flex flex-col items-center shrink-0 relative shadow-[0_0_15px_rgba(34,197,94,0.1)]">
              <div className="absolute top-0 left-0 w-full bg-green-500/20 border-b border-green-500/50 px-2 py-0.5 text-[10px] text-green-500">
                root@vocab:~# query_translation --target
              </div>
              <div className="mt-4 mb-2 text-green-500/60 text-[10px] tracking-widest">[ AWAITING_MATCH ]</div>
              <h2 className="text-2xl sm:text-3xl font-bold text-green-500 text-center break-words w-full tracking-widest uppercase">
                {currentQ.question}
              </h2>
              <button onClick={() => speakWord(currentQ.question)} className="mt-4 text-green-500 border border-green-500/30 hover:bg-green-500 hover:text-black p-2 transition-colors flex items-center gap-2 text-xs">
                <Volume2 size={16} /> AUDIO
              </button>
            </div>

            <div className="flex-1 flex flex-col gap-3 overflow-y-auto pb-4 custom-scrollbar">
              {currentQ.options.map((option, idx) => {
                let btnClass = "w-full p-4 text-left text-sm sm:text-base font-bold border transition-all duration-200 active:scale-[0.98] flex items-center gap-3 ";
                if (!isAnswered) {
                  btnClass += "bg-black border-green-500/30 text-green-500 hover:border-green-500 hover:bg-green-500 hover:text-black";
                } else {
                  if (option === currentQ.answer) {
                    btnClass += "bg-green-500 border-green-500 text-black"; 
                  } else if (option === selectedOption) {

                  } else {
                    btnClass += "bg-black border-green-500/20 text-green-500/30 opacity-50";

                return (
                  <button key={idx} onClick={() => handleOptionSelect(option)} disabled={isAnswered} className={btnClass}>

                    <span className="flex-1">{option}</span>

            </div>

            <div className="mt-2 h-[50px] shrink-0">
              {isAnswered && (
                <button onClick={nextQuestion} className="w-full h-full bg-black border border-green-500 text-green-500 text-lg font-bold hover:bg-green-500 hover:text-black active:scale-95 transition-all flex items-center justify-center gap-2 uppercase tracking-widest shadow-[0_0_10px_rgba(34,197,94,0.2)]">
                  <span>{currentIndex === quizQuestions.length - 1 ? 'FINISH' : 'NEXT'}</span>

              )}
            </div>
          </div>
        );
      };

      // 渲染手寫填空測驗 (駭客風格)
      const renderFillBlank = () => {
        const currentQ = quizQuestions[currentIndex];
        if (!currentQ) return null;
        const exampleParts = currentQ.example ? currentQ.example.split('_____') : ['The answer is ', '.'];

        return (
          <div className="flex flex-col min-h-[100dvh] pt-6 pb-8 px-5 max-w-md mx-auto relative z-10 font-mono">

              <div className="absolute top-0 left-0 w-full bg-green-500/20 border-b border-green-500/50 px-2 py-0.5 text-[10px] text-green-500">

              </div>
              <div className="mt-4 w-full text-left text-[10px] text-green-500/50 mb-1">

              <div className="text-sm sm:text-base text-green-400 text-left leading-relaxed break-words w-full">
                {exampleParts[0]}
                <span className="inline-block font-bold text-white bg-green-500/20 border border-green-500/50 px-1 mx-1">

                <input
                  type="text"
                  value={userInput}
                  onChange={(e) => setUserInput(e.target.value)}
                  disabled={isAnswered}
                  placeholder="insert_payload_"
                  className={`w-full p-3 bg-transparent text-lg font-bold outline-none transition-all ${

                  autoCapitalize="none"
                  autoComplete="off"
                  spellCheck="false"
                  onKeyDown={(e) => { if (e.key === 'Enter') handleFillBlankSubmit(); }}
                />
              </div>

              {!isAnswered ? (
                <button onClick={handleFillBlankSubmit} disabled={!userInput.trim()} className="w-full p-4 bg-green-500 text-black text-lg font-bold tracking-widest border border-green-500 disabled:opacity-30 disabled:bg-black disabled:text-green-500 active:scale-95 transition-all shadow-[0_0_15px_rgba(34,197,94,0.3)] hover:bg-green-400">
                  EXECUTE
                </button>
              ) : (
                <div className="flex flex-col items-center w-full animate-fade-in-up">
                  {isInputCorrect ? (
                    <div className="flex items-center gap-2 text-black bg-green-500 font-bold text-sm mb-3 px-4 py-2 w-full uppercase tracking-widest border border-green-400">
                      <Unlock size={16} /> [ ACCESS_GRANTED ]
                    </div>
                  ) : (
                    <div className="flex flex-col gap-1 mb-3 bg-black border border-red-500 p-4 w-full text-left shadow-[0_0_10px_rgba(239,68,68,0.2)]">
                      <div className="flex items-center gap-2 text-red-500 font-bold text-xs uppercase tracking-widest">
                        <Lock size={14} /> [ ACCESS_DENIED ]
                      </div>
                      <div className="text-green-500/50 text-xs mt-2">// Correct_Payload_Required:</div>
                      <div className="text-red-400 font-bold text-lg">{currentQ.question}</div>
                    </div>
                  )}

                  <div className="w-full bg-black p-4 mt-2 mb-4 text-left border border-green-500/30">
                    <span className="text-[10px] text-green-500/50 font-bold block mb-1 uppercase tracking-widest">// Translation_Log:</span>
                    <p className="text-green-400 text-xs sm:text-sm leading-relaxed">{currentQ.translation}</p>
                  </div>
                  
                  <button onClick={nextQuestion} className="w-full p-4 bg-black border border-green-500 text-green-500 hover:bg-green-500 hover:text-black text-lg font-bold tracking-widest active:scale-95 transition-all flex items-center justify-center gap-2 uppercase shadow-[0_0_10px_rgba(34,197,94,0.2)]">
                    <span>{currentIndex === quizQuestions.length - 1 ? 'TERMINATE' : 'CONTINUE'}</span>
                    <ChevronsRight size={20} />
                  </button>
                </div>
              )}
            </div>
          </div>
        );
      };

      // 渲染結果頁面
      const renderResult = () => {
        const percentage = Math.round((score / quizQuestions.length) * 100);
        let message = "";
        let statusClass = "text-green-500";
        if (percentage >= 90) message = "ROOT_ACCESS_OBTAINED";
        else if (percentage >= 70) message = "SECURITY_BYPASSED";
        else if (percentage >= 50) { message = "PARTIAL_BREACH"; statusClass = "text-yellow-500"; }
        else { message = "INTRUSION_FAILED"; statusClass = "text-red-500"; }

        return (
          <div className="flex flex-col items-center justify-center min-h-[100dvh] px-6 py-8 relative z-10 font-mono">
            <div className="bg-black p-8 border border-green-500/50 w-full max-w-sm flex flex-col items-center text-center shadow-[0_0_20px_rgba(34,197,94,0.15)] relative">
              <div className="absolute top-0 left-0 w-full bg-green-500/20 border-b border-green-500/50 px-2 py-0.5 text-[10px] text-green-500 text-left">
                root@vocab:~# print_report
              </div>

              <div className="mb-6 mt-6">
                <Trophy size={48} className={percentage >= 70 ? "text-green-500 drop-shadow-[0_0_8px_rgba(34,197,94,0.8)]" : "text-green-500/30"} strokeWidth={1} />
              </div>
              
              <h2 className="text-xl font-bold text-white mb-2 tracking-widest uppercase">[ OPERATION_COMPLETE ]</h2>
              <p className={`text-xs mb-8 tracking-widest ${statusClass}`}>{message}</p>
              
              <div className="flex flex-col items-center justify-center mb-10 w-full text-green-500 border border-green-500/30 p-4 bg-green-500/5">
                <div className="text-[10px] opacity-50 mb-1 uppercase tracking-widest">Score_Matrix:</div>
                <div className="flex items-baseline">
                  <span className="text-5xl font-black">{score}</span>
                  <span className="text-xl opacity-50">/{quizQuestions.length}</span>
                </div>
              </div>

              <div className="w-full space-y-3">
                <button onClick={quizMode === 'fillBlank' ? startFillBlank : startQuiz} className="w-full bg-green-500 hover:bg-green-400 text-black font-bold text-sm tracking-widest p-4 flex items-center justify-center gap-2 active:scale-95 transition-all shadow-[0_0_10px_rgba(34,197,94,0.3)] uppercase">
                  <RotateCcw size={16} />
                  <span>REBOOT_SEQ</span>
                </button>
                <button onClick={() => setView('home')} className="w-full bg-black text-green-500 hover:bg-green-500 hover:text-black font-bold text-sm tracking-widest p-4 flex items-center justify-center gap-2 active:scale-95 transition-all border border-green-500 uppercase">
                  <Home size={16} />
                  <span>LOGOUT</span>
                </button>
              </div>
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-[100dvh] bg-black text-green-500 font-mono selection:bg-green-500 selection:text-black overflow-hidden relative scanlines">
          <MatrixRain />
          <BackgroundLogs />
          <main className="w-full h-full relative z-10 overflow-y-auto">
            {view === 'home' && renderHome()}
            {view === 'flashcard' && renderFlashcard()}
            {view === 'quiz' && renderQuiz()}
            {view === 'fillBlank' && renderFillBlank()}
            {view === 'result' && renderResult()}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
